version: "2"
linters:
  default: none
  enable:
    - dogsled
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    dupl:
      threshold: 120
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - emptyStringTest
        - typeUnparen
        - hugeParam
        - rangeValCopy
        - exitAfterDefer
        - whyNoLint
        - singleCaseSwitch
        - commentedOutCode
        - appendAssign
        - unnecessaryBlock
        - redundantSprint
        - ptrToRefParam
        - typeDefFirst
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G115
    lll:
      line-length: 140
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - lll
          - scopelint
        path: _test\.go
      - path: _test\.go
        text: 'structtag: struct field tag .* bad syntax for struct tag pair'
      - linters:
          - govet
        text: declaration of "(err|ctx|log|c)"
      - linters:
          - funlen
          - gocognit
          - goconst
          - gocyclo
        path: main\.go
      - linters:
          - revive
        text: 'exported: exported .+ should have comment.*or be unexported'
      - linters:
          - golint
          - revive
        text: unused-parameter
      - path: encode\.go
        text: 'shadow: declaration of "tail" shadows declaration'
        source: var tail string
      - linters:
          - deadcode
          - ineffassign
          - unparam
          - varcheck
          - whitespace
        path: (apic|writerc|emitterc|parserc|scannerc|readerc|yamlh|yamlprivateh)\.go
      - linters:
          - revive
        path: (apic|writerc|emitterc|parserc|scannerc|readerc|yamlh|yamlprivateh)\.go
        text: '(var-naming: don''t use underscores|increment-decrement:|indent-error-flow:|empty-block:)'
      - linters:
          - gocritic
        path: apic\.go
        text: commentFormatting
      - linters:
          - gocritic
        path: emitterc\.go
        text: (elseIf|ifElseChain)
      - linters:
          - gocritic
          - govet
        path: parserc\.go
        text: (shadow|ifElseChain)
      - linters:
          - gocritic
        path: scannerc\.go
        text: (elseIf|ifElseChain|boolExprSimplify|commentFormatting|appendCombine)
      - linters:
          - gocritic
        path: readerc\.go
        text: (ifElseChain|paramTypeCombine)
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/go-faster/
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
